<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronómetro de Examen Pro</title>
    <style>
        :root {
            --bg-color: #e0e5ec;
            --card-bg: #f0f2f5;
            --accent-red: #d9534f;
            --blue-btn: #a3b8d7;
            --progress-blue: #4a90e2;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            width: 850px;
            padding: 40px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .status {
            color: var(--accent-red);
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .clock-main {
            font-size: 8rem;
            font-weight: 300;
            color: #444;
            margin: 10px 0;
        }

        /* Barra de Progreso */
        .progress-area {
            position: relative;
            width: 90%;
            margin: 50px auto 20px auto;
        }

        .progress-container {
            height: 8px;
            background: #ccc;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--progress-blue);
            width: 0%;
            transition: width 1s linear;
        }

        .marker {
            position: absolute;
            top: -4px;
            width: 16px;
            height: 16px;
            background: #666;
            border-radius: 50%;
            transform: translateX(-50%);
            z-index: 2;
        }

        .marker-label {
            position: absolute;
            top: -25px;
            font-size: 0.85rem;
            font-weight: bold;
            transform: translateX(-50%);
        }

        /* Leyendas de tiempo (Nuevas) */
        .time-milestones {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
            font-size: 0.85rem;
            color: #666;
            font-style: italic;
        }

        /* Horas Inferiores */
        .time-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .time-box h3 {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .time-box p {
            font-size: 2.8rem;
            font-weight: bold;
            margin: 0;
            color: #333;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        select, .btn {
            padding: 15px 25px;
            border-radius: 15px;
            border: none;
            font-size: 1rem;
            background: #d1d9e6;
            cursor: pointer;
        }

        .btn-blue {
            background-color: var(--blue-btn);
            flex-grow: 1;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="status" id="status-text">¡EXAMEN EN CURSO!</div>
    
    <div class="clock-main" id="current-time">00:00:00</div>

    <div class="progress-area">
        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>
        <div class="marker" style="left: 70%;"></div>
        <div class="marker-label" style="left: 70%;">30m</div>
        
        <div class="marker" style="left: 95%;"></div>
        <div class="marker-label" style="left: 95%;">5m</div>
    </div>

    <div class="time-milestones">
        <span id="label-30m">Faltarán 30m a las: --:--</span>
        <span id="label-5m">Faltarán 5m a las: --:--</span>
    </div>

    <div class="time-info">
        <div class="time-box">
            <h3>Hora Inicial</h3>
            <p id="start-time">--:--:--</p>
        </div>
        <div class="time-box">
            <h3>Hora Final</h3>
            <p id="end-time">--:--:--</p>
        </div>
    </div>

    <div class="controls">
        <select id="duration-select">
            <option value="60">60 min</option>
            <option value="75">75 min</option>
            <option value="90">90 min</option>
            <option value="105" selected>105 min</option>
            <option value="120">120 min</option>
            <option value="135">135 min</option>
            <option value="150">150 min</option>
        </select>
        
        <button class="btn btn-blue" onclick="startExam()">Iniciar Lectura (5 min)</button>
        <button class="btn" onclick="location.reload()">Reiniciar</button>
    </div>
</div>

<script>
    let startTime, endTime, marker30, marker5;
    let played30 = false;
    let played5 = false;

    // Función para emitir sonido (Beep)
    function playNotificationSound(frequency) {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.5); // Duración 0.5s
    }

    function updateClock() {
        const now = new Date();
        document.getElementById('current-time').innerText = now.toLocaleTimeString('en-GB');

        if (startTime && endTime) {
            const totalMs = endTime - startTime;
            const elapsedMs = now - startTime;
            let progress = (elapsedMs / totalMs) * 100;
            
            document.getElementById('progress').style.width = Math.min(Math.max(progress, 0), 100) + "%";

            // Lógica de sonidos
            if (now >= marker30 && !played30) {
                playNotificationSound(440); // Sonido medio
                played30 = true;
                console.log("Aviso: Faltan 30 minutos");
            }
            if (now >= marker5 && !played5) {
                playNotificationSound(880); // Sonido agudo
                played5 = true;
                console.log("Aviso: Faltan 5 minutos");
            }
        }
    }

    function startExam() {
        const now = new Date();
        const duration = parseInt(document.getElementById('duration-select').value);
        
        startTime = new Date(now.getTime());
        endTime = new Date(now.getTime() + duration * 60000);
        
        // Calcular horas de los hitos
        marker30 = new Date(endTime.getTime() - 30 * 60000);
        marker5 = new Date(endTime.getTime() - 5 * 60000);

        // Reset de flags de sonido
        played30 = false;
        played5 = false;

        // Mostrar horas en pantalla
        const formatOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
        const shortFormat = { hour: '2-digit', minute: '2-digit' };

        document.getElementById('start-time').innerText = startTime.toLocaleTimeString('en-GB', formatOptions);
        document.getElementById('end-time').innerText = endTime.toLocaleTimeString('en-GB', formatOptions);
        
        document.getElementById('label-30m').innerText = `Faltarán 30m a las: ${marker30.toLocaleTimeString('en-GB', shortFormat)}`;
        document.getElementById('label-5m').innerText = `Faltarán 5m a las: ${marker5.toLocaleTimeString('en-GB', shortFormat)}`;
        
        document.getElementById('status-text').innerText = "¡EXAMEN EN CURSO!";
    }

    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
