<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj para exámenes IB</title>
    <style>
        :root {
            --bg-color: #0f0f11;
            --card-bg: #1c1c1e;
            --primary-blue: #367fff;
            --accent-orange: #ff9f0a;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --track-bg: #3a3a3c;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: center; /* Centrado inicial */
            transition: justify-content 0.5s ease;
        }

        /* El visor está oculto por defecto */
        #file-viewer {
            display: none;
            flex-grow: 1;
            justify-content: center;
            align-items: center;
            background: #000;
            overflow: auto;
            border-bottom: 1px solid #333;
        }

        #file-viewer img { max-width: 95%; max-height: 95%; border-radius: 8px; }
        #file-viewer iframe { width: 100%; height: 100%; border: none; }

        /* Contenedor del Reloj */
        .main-container {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .card {
            background-color: var(--card-bg);
            width: 440px;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            transition: all 0.5s ease;
        }

        /* Estilo cuando hay archivo cargado */
        body.has-file { justify-content: flex-end; }
        body.has-file #file-viewer { display: flex; }
        body.has-file .card {
            width: 100%;
            border-radius: 0;
            padding: 15px 40px;
            box-shadow: none;
        }
        body.has-file .controls, 
        body.has-file .progress-container,
        body.has-file #status-legend { display: none; }
        body.has-file #main-clock { font-size: 40px; margin: 5px 0; }
        body.has-file .time-labels { margin-bottom: 5px; }

        /* Elementos del Reloj */
        #warmup-timer {
            font-size: 18px;
            color: var(--accent-orange);
            font-weight: 700;
            margin-bottom: 10px;
            display: none;
            background: rgba(255, 159, 10, 0.1);
            padding: 4px 15px;
            border-radius: 20px;
            width: fit-content;
            margin: 0 auto 10px;
        }

        #status-legend { font-size: 14px; color: var(--accent-orange); margin-bottom: 10px; height: 20px; }
        #main-clock { font-size: 72px; font-weight: 200; margin-bottom: 30px; font-variant-numeric: tabular-nums; }

        .progress-container {
            position: relative;
            width: 100%;
            height: 6px;
            background: var(--track-bg);
            border-radius: 10px;
            margin-bottom: 50px;
        }

        #progress-fill { height: 100%; width: 0%; background: var(--primary-blue); border-radius: 10px; }

        .marker {
            position: absolute; top: 50%; width: 14px; height: 14px;
            background: white; border-radius: 50%;
            transform: translate(-50%, -50%); display: none;
        }
        .marker-label { position: absolute; top: -30px; font-size: 13px; color: var(--text-dim); transform: translateX(-50%); }

        .time-labels { display: flex; justify-content: space-between; margin-bottom: 30px; }
        .label-value { font-size: 16px; font-weight: 600; color: var(--text-dim); font-variant-numeric: tabular-nums; }

        .controls { display: flex; gap: 12px; }
        button, select, .file-btn {
            flex: 1; height: 50px; border-radius: 14px; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none;
        }
        #start-btn { background: var(--primary-blue); color: white; }
        select { background: #2c2c2e; color: white; padding: 0 10px; }
        .file-btn { background: #3a3a3c; color: white; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div id="file-viewer"></div>

<div class="main-container">
    <div class="card" id="main-card">
        <div id="warmup-timer">-05:00</div>
        <div id="status-legend">Selecciona la duración de la prueba</div>
        <div id="main-clock">00:00:00</div>

        <div class="progress-container">
            <div id="progress-fill"></div>
            <div id="m30" class="marker"><span class="marker-label">30min</span></div>
            <div id="m5" class="marker"><span class="marker-label">5min</span></div>
        </div>

        <div class="time-labels">
            <div style="text-align: left;">
                <span style="font-size: 10px; color: #555; display: block;">HORA INICIAL</span>
                <span id="start-time-display" class="label-value">--:--:--</span>
            </div>
            <div style="text-align: right;">
                <span style="font-size: 10px; color: #555; display: block;">HORA FINAL</span>
                <span id="end-time-display" class="label-value">--:--:--</span>
            </div>
        </div>

        <div class="controls">
            <button id="start-btn">Iniciar 5 min de lectura</button>
            <select id="duration-select">
                <option value="" disabled selected>Duración</option>
                <option value="60">60 min</option>
                <option value="75">75 min</option>
                <option value="90">90 min</option>
                <option value="105">105 min</option>
                <option value="135">135 min</option>
            </select>
            <label class="file-btn">
                Archivo
                <input type="file" id="file-input" accept="image/*, .pdf">
            </label>
        </div>
    </div>
</div>

<script>
    let state = 'IDLE'; 
    let startTime, endTime, durationMins;
    let alertsDone = { start: false, m30: false, m5: false };

    function playTone() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.value = 440;
        g.gain.setValueAtTime(0.1, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.5);
        osc.start(); osc.stop(ctx.currentTime + 1.5);
    }

    // Lógica de carga de archivos
    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const viewer = document.getElementById('file-viewer');
        viewer.innerHTML = '';
        document.body.classList.add('has-file');

        if (file.type.startsWith('image/')) {
            const img = document.createElement('img');
            img.src = URL.createObjectURL(file);
            viewer.appendChild(img);
        } else {
            const iframe = document.createElement('iframe');
            iframe.src = URL.createObjectURL(file);
            viewer.appendChild(iframe);
        }
    });

    function update() {
        const now = new Date();
        const clock = document.getElementById('main-clock');
        const warmup = document.getElementById('warmup-timer');
        const legend = document.getElementById('status-legend');

        if (state === 'IDLE') {
            clock.textContent = formatFullTime(now);
        } 
        else if (state === 'READING') {
            const diff = startTime - now;
            if (diff > 0) {
                const s = Math.ceil(diff / 1000);
                warmup.textContent = `-${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
                warmup.style.display = 'block';
                legend.textContent = "Tiempo de lectura, no se permite escribir";
                clock.textContent = formatFullTime(now);
            } else {
                state = 'ACTIVE';
                playTone(); // Alerta de inicio de prueba oficial
                warmup.style.display = 'none';
                legend.textContent = "";
                document.querySelectorAll('.marker').forEach(m => m.style.display = 'block');
            }
        }

        if (state === 'ACTIVE') {
            clock.textContent = formatFullTime(now);
            const elapsed = now - startTime;
            const total = durationMins * 60000;
            document.getElementById('progress-fill').style.width = Math.min((elapsed/total)*100, 100) + "%";

            const left = (endTime - now) / 60000;
            if (left <= 30 && !alertsDone.m30) { playTone(); alertsDone.m30 = true; }
            if (left <= 5 && !alertsDone.m5) { playTone(); alertsDone.m5 = true; }
        }
    }

    document.getElementById('start-btn').addEventListener('click', () => {
        const sel = document.getElementById('duration-select');
        if (!sel.value) return alert("Selecciona una duración");

        durationMins = parseInt(sel.value);
        startTime = new Date(Date.now() + 5 * 60000);
        endTime = new Date(startTime.getTime() + durationMins * 60000);

        document.getElementById('start-time-display').textContent = formatFullTime(startTime);
        document.getElementById('end-time-display').textContent = formatFullTime(endTime);
        
        state = 'READING';
        document.getElementById('start-btn').disabled = true;
        document.getElementById('start-btn').style.opacity = '0.3';
        
        const p30 = ((durationMins - 30) / durationMins) * 100;
        const p5 = ((durationMins - 5) / durationMins) * 100;
        document.getElementById('m30').style.left = p30 + "%";
        document.getElementById('m5').style.left = p5 + "%";
    });

    function formatFullTime(d) {
        return d.getHours().toString().padStart(2,'0') + ":" + 
               d.getMinutes().toString().padStart(2,'0') + ":" + 
               d.getSeconds().toString().padStart(2,'0');
    }

    setInterval(update, 1000);
</script>
</body>
</html>
