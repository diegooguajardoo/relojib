<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj para exámenes IB</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1c1c1e;
            --primary-blue: #1d97e1;
            --accent-orange: #fef503;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --track-bg: #3a3a3c;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: var(--card-bg);
            width: 440px;
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        #status-legend {
            font-size: 14px;
            color: var(--accent-orange);
            margin-bottom: 10px;
            height: 20px;
            font-weight: 500;
        }

        #timer-display {
            font-size: 72px;
            font-weight: 200;
            margin-bottom: 40px;
            font-variant-numeric: tabular-nums;
        }

        .reading-mode #timer-display { color: var(--accent-orange); }

        .progress-container {
            position: relative;
            width: 100%;
            height: 6px;
            background: var(--track-bg);
            border-radius: 10px;
            margin-bottom: 60px;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: var(--primary-blue);
            border-radius: 10px;
            transition: width 0.5s linear;
        }

        .marker {
            position: absolute;
            top: 50%;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            display: none; /* Ocultos por defecto */
        }

        .marker-label {
            position: absolute;
            top: -30px;
            font-size: 13px;
            color: var(--text-dim);
            transform: translateX(-50%);
        }

        .time-labels {
            display: flex;
            justify-content: space-between;
            margin-bottom: 40px;
        }

        .label-group { text-align: left; }
        .label-group.end { text-align: right; }

        .label-title {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .label-value { font-size: 18px; font-weight: 600; font-variant-numeric: tabular-nums; }

        .controls { display: flex; gap: 12px; }

        button, select {
            flex: 1;
            height: 55px;
            border-radius: 16px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        #start-btn { background-color: var(--primary-blue); color: white; }
        select { background-color: #2c2c2e; color: white; padding: 0 10px; }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <div id="status-legend">Selecciona la duración de la prueba</div>
    <div id="timer-display">00:00:00</div>

    <div class="progress-container">
        <div id="progress-fill"></div>
        <div id="m30" class="marker"><span class="marker-label">30min</span></div>
        <div id="m5" class="marker"><span class="marker-label">5min</span></div>
    </div>

    <div class="time-labels">
        <div class="label-group">
            <div class="label-title">Hora Inicial</div>
            <div id="start-time-display" class="label-value">--:--:--</div>
        </div>
        <div class="label-group end">
            <div class="label-title">Hora Final</div>
            <div id="end-time-display" class="label-value">--:--:--</div>
        </div>
    </div>

    <div class="controls">
        <button id="start-btn">Iniciar 5 min de lectura</button>
        <select id="duration-select">
            <option value="" disabled selected>Duración</option>
            <option value="60">60 min</option>
            <option value="75">75 min</option>
            <option value="90">90 min</option>
            <option value="105">105 min</option>
            <option value="135">135 min</option>
        </select>
    </div>
</div>

<script>
    let sessionState = 'IDLE'; // IDLE, READING, ACTIVE
    let startTime = null;
    let endTime = null;
    let durationMinutes = 0;
    let alertsDone = { start: false, m30: false, m5: false };

    function playAlertTone() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.5);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 1.5);
    }

    function updateUI() {
        const now = new Date();
        const display = document.getElementById('timer-display');
        const legend = document.getElementById('status-legend');
        const card = document.getElementById('main-card');

        if (sessionState === 'IDLE') {
            display.textContent = formatFullTime(now);
        } 
        else if (sessionState === 'READING') {
            const diffMs = startTime - now;
            if (diffMs > 0) {
                const totalSeconds = Math.ceil(diffMs / 1000);
                const mins = Math.floor(totalSeconds / 60);
                const secs = totalSeconds % 60;
                display.textContent = `-${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
                legend.textContent = "Tiempo de lectura, no se permite escribir.";
            } else {
                // CAMBIO A FASE ACTIVA
                sessionState = 'ACTIVE';
                playAlertTone(); // Alerta al empezar hora de inicio
                legend.textContent = ""; 
                document.querySelectorAll('.marker').forEach(m => m.style.display = 'block');
            }
        } 
        
        if (sessionState === 'ACTIVE') {
            card.classList.remove('reading-mode');
            display.textContent = formatFullTime(now);
            
            const totalElapsedMs = now - startTime;
            const totalDurationMs = durationMinutes * 60000;
            let percentage = (totalElapsedMs / totalDurationMs) * 100;
            percentage = Math.min(Math.max(percentage, 0), 100);
            document.getElementById('progress-fill').style.width = percentage + "%";

            // Alertas de 30 y 5 min restantes
            const timeLeftMin = (endTime - now) / 60000;
            if (timeLeftMin <= 30 && !alertsDone.m30) { playAlertTone(); alertsDone.m30 = true; }
            if (timeLeftMin <= 5 && !alertsDone.m5) { playAlertTone(); alertsDone.m5 = true; }
        }
    }

    document.getElementById('start-btn').addEventListener('click', () => {
        const select = document.getElementById('duration-select');
        if (!select.value) return alert("Selecciona una duración");

        durationMinutes = parseInt(select.value);
        const now = new Date();
        
        startTime = new Date(now.getTime() + 5 * 60000); // +5 min lectura
        endTime = new Date(startTime.getTime() + durationMinutes * 60000);

        document.getElementById('start-time-display').textContent = formatFullTime(startTime);
        document.getElementById('end-time-display').textContent = formatFullTime(endTime);

        sessionState = 'READING';
        document.getElementById('main-card').classList.add('reading-mode');
        positionMarkers(durationMinutes);
        
        document.getElementById('start-btn').disabled = true;
        document.getElementById('start-btn').style.opacity = "0.3";
    });

    function positionMarkers(total) {
        document.getElementById('m30').style.left = ((total - 30) / total * 100) + "%";
        document.getElementById('m5').style.left = ((total - 5) / total * 100) + "%";
    }

    function formatFullTime(date) {
        return String(date.getHours()).padStart(2, '0') + ":" + 
               String(date.getMinutes()).padStart(2, '0') + ":" +
               String(date.getSeconds()).padStart(2, '0');
    }

    setInterval(updateUI, 1000);
    updateUI();
</script>

</body>
</html>
