<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reloj de Prueba Multimodal</title>
    <style>
        :root {
            --bg-color: #0f0f11;
            --card-bg: #1c1c1e;
            --primary-blue: #007aff;
            --accent-orange: #ff9f0a;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --track-bg: #3a3a3c;
            --marker-bg: #ffffff;
        }

        [data-theme="light"] {
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --primary-blue: #007aff;
            --accent-orange: #d35400;
            --text-main: #1c1c1e;
            --text-dim: #636366;
            --track-bg: #e5e5ea;
            --marker-bg: #1c1c1e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: background 0.3s ease;
        }

        /* TEMA ESQUINA */
        .theme-container {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            display: flex; align-items: center; gap: 6px;
        }
        .switch { position: relative; display: inline-block; width: 30px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #3a3a3c; transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary-blue); }
        input:checked + .slider:before { transform: translateX(12px); }

        /* VISOR MULTIMODAL */
        #file-viewer {
            display: none; flex-grow: 1; justify-content: center;
            align-items: center; background: #000; overflow: auto;
        }
        #file-viewer img { max-width: 95%; max-height: 95%; object-fit: contain; }
        #file-viewer iframe { width: 100%; height: 100%; border: none; }
        #file-viewer audio { width: 80%; max-width: 500px; }

        /* CONTENEDOR */
        .container {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; flex-grow: 1; transition: all 0.5s ease;
        }
        .card {
            background-color: var(--card-bg); width: 90%; max-width: 600px;
            padding: 40px; border-radius: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            text-align: center; transition: all 0.5s ease;
        }

        body.has-file .container { flex-grow: 0; }
        body.has-file #file-viewer { display: flex; }
        body.has-file .card {
            max-width: 100%; width: 100%; border-radius: 0;
            padding: 15px 10%; box-shadow: none; border-top: 1px solid var(--track-bg);
        }
        body.has-file .controls { display: none; }
        body.has-file #main-clock { font-size: 42px; margin: 5px 0; }

        /* COMPONENTES RELOJ */
        #warmup-timer { font-size: 20px; color: var(--accent-orange); font-weight: 800; margin-bottom: 5px; display: none; }
        #main-clock { font-size: 84px; font-weight: 200; margin-bottom: 20px; font-variant-numeric: tabular-nums; }

        .progress-container {
            position: relative; width: 100%; height: 10px; background: var(--track-bg);
            border-radius: 10px; margin: 35px 0;
        }
        #progress-fill { height: 100%; width: 0%; background: var(--primary-blue); border-radius: 10px; transition: width 1s linear; }

        .marker {
            position: absolute; top: 50%; width: 14px; height: 14px;
            background: var(--marker-bg); border-radius: 50%;
            transform: translate(-50%, -50%); display: none; border: 2px solid var(--primary-blue);
        }
        .marker-label { position: absolute; top: -25px; font-size: 12px; color: var(--text-dim); transform: translateX(-50%); font-weight: 700; }

        /* HORAS REFORZADAS */
        .time-labels { display: flex; justify-content: space-between; width: 100%; }
        .label-title { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; display: block; }
        .label-value { font-size: 34px; font-weight: 900; font-variant-numeric: tabular-nums; }

        /* CONTROLES REORDENADOS */
        .controls { display: flex; gap: 12px; margin-top: 35px; width: 100%; }
        button, select, .file-btn {
            flex: 1; height: 55px; border-radius: 16px; border: none;
            font-size: 14px; font-weight: 700; cursor: pointer; 
            background: var(--track-bg); color: var(--text-main);
        }
        #start-btn { background: var(--primary-blue); color: white; flex: 1.5; }
        select { padding: 0 15px; }
        .file-btn { display: flex; align-items: center; justify-content: center; }
        input[type="file"] { display: none; }
    </style>
</head>
<body data-theme="dark">

<div class="theme-container">
    <span style="font-size: 10px;">☀️</span>
    <label class="switch">
        <input type="checkbox" id="theme-toggle">
        <span class="slider"></span>
    </label>
    <span style="font-size: 10px;">🌙</span>
</div>

<div id="file-viewer"></div>

<div class="container">
    <div class="card">
        <div id="warmup-timer">-05:00</div>
        <div id="status-legend" style="font-size: 14px; color: var(--accent-orange); margin-bottom: 5px; font-weight: 600;">Selecciona la duración de la prueba</div>
        <div id="main-clock">00:00:00</div>

        <div class="progress-container">
            <div id="progress-fill"></div>
            <div id="m30" class="marker"><span class="marker-label">30m</span></div>
            <div id="m5" class="marker"><span class="marker-label">5m</span></div>
        </div>

        <div class="time-labels">
            <div style="text-align: left;">
                <span class="label-title">Hora Inicial</span>
                <span id="start-time-display" class="label-value">--:--:--</span>
            </div>
            <div style="text-align: right;">
                <span class="label-title">Hora Final</span>
                <span id="end-time-display" class="label-value">--:--:--</span>
            </div>
        </div>

        <div class="controls">
            <select id="duration-select">
                <option value="" disabled selected>Duración</option>
                <option value="60">60 min</option>
                <option value="75">75 min</option>
                <option value="90">90 min</option>
                <option value="105">105 min</option>
                <option value="135">135 min</option>
            </select>

            <button id="start-btn">Iniciar Lectura</button>

            <label class="file-btn">
                Archivo
                <input type="file" id="file-input" accept="image/*, application/pdf, audio/*">
            </label>
        </div>
    </div>
</div>

<script>
    let state = 'IDLE'; 
    let startTime, endTime, durationMins;
    let alertsDone = { m30: false, m5: false };

    // TEMA
    const themeToggle = document.getElementById('theme-toggle');
    themeToggle.addEventListener('change', () => {
        document.body.setAttribute('data-theme', themeToggle.checked ? 'light' : 'dark');
    });

    // SONIDO
    function playTone() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.value = 440;
        g.gain.setValueAtTime(0.1, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1.5);
        osc.start(); osc.stop(ctx.currentTime + 1.5);
    }

    // MANEJO MULTIMODAL DE ARCHIVOS
    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const viewer = document.getElementById('file-viewer');
        viewer.innerHTML = '';
        document.body.classList.add('has-file');

        const fileURL = URL.createObjectURL(file);

        if (file.type.startsWith('image/')) {
            const img = document.createElement('img');
            img.src = fileURL;
            viewer.appendChild(img);
        } else if (file.type === 'application/pdf') {
            const iframe = document.createElement('iframe');
            iframe.src = fileURL;
            viewer.appendChild(iframe);
        } else if (file.type.startsWith('audio/')) {
            const audio = document.createElement('audio');
            audio.src = fileURL;
            audio.controls = true;
            viewer.appendChild(audio);
        }
    });

    function update() {
        const now = new Date();
        const clock = document.getElementById('main-clock');
        const warmup = document.getElementById('warmup-timer');
        const legend = document.getElementById('status-legend');

        if (state === 'IDLE') {
            clock.textContent = formatFullTime(now);
        } 
        else if (state === 'READING') {
            const diff = startTime - now;
            if (diff > 0) {
                const s = Math.ceil(diff / 1000);
                warmup.textContent = `-${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
                warmup.style.display = 'block';
                legend.textContent = "TIEMPO DE LECTURA - NO ESCRIBIR";
                clock.textContent = formatFullTime(now);
            } else {
                state = 'ACTIVE';
                playTone();
                warmup.style.display = 'none';
                legend.textContent = "¡EXAMEN EN CURSO!";
                document.querySelectorAll('.marker').forEach(m => m.style.display = 'block');
            }
        }

        if (state === 'ACTIVE') {
            clock.textContent = formatFullTime(now);
            const elapsed = now - startTime;
            const total = durationMins * 60000;
            document.getElementById('progress-fill').style.width = Math.min((elapsed/total)*100, 100) + "%";

            const left = (endTime - now) / 60000;
            if (left <= 30 && !alertsDone.m30) { playTone(); alertsDone.m30 = true; }
            if (left <= 5 && !alertsDone.m5) { playTone(); alertsDone.m5 = true; }
        }
    }

    document.getElementById('start-btn').addEventListener('click', () => {
        const sel = document.getElementById('duration-select');
        if (!sel.value) return alert("Selecciona la duración");

        durationMins = parseInt(sel.value);
        startTime = new Date(Date.now() + 5 * 60000);
        endTime = new Date(startTime.getTime() + durationMins * 60000);

        document.getElementById('start-time-display').textContent = formatFullTime(startTime);
        document.getElementById('end-time-display').textContent = formatFullTime(endTime);
        
        state = 'READING';
        document.getElementById('start-btn').disabled = true;
        document.getElementById('start-btn').style.opacity = '0.3';
        
        const p30 = ((durationMins - 30) / durationMins) * 100;
        const p5 = ((durationMins - 5) / durationMins) * 100;
        document.getElementById('m30').style.left = p30 + "%";
        document.getElementById('m5').style.left = p5 + "%";
    });

    function formatFullTime(d) {
        return d.getHours().toString().padStart(2,'0') + ":" + 
               d.getMinutes().toString().padStart(2,'0') + ":" + 
               d.getSeconds().toString().padStart(2,'0');
    }

    setInterval(update, 1000);
</script>
</body>
</html>
